<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Geoestatístico - Visualização de Pontos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
</head>
<body>

    <header>
        <div class="header-content">
            <div>
                <h1>Mapa Geoestatístico</h1>
                <p>Visualização de pontos com QuadTree</p>
            </div>
            <div id="contagem-pontos" class="contagem">
                Nenhum ponto carregado
            </div>
        </div>
    </header>

    <main class="container">

        <aside class="sidebar">
            <h2>Configurações</h2>

            <div class="upload-area">
                <label for="csv">
                    Selecione um arquivo CSV
                </label>
                <input type="file" id="csv" accept=".csv">
            </div>

            <div id="status" class="info-box">
                <p>Aguardando arquivo...</p>
            </div>

            <div id="estatisticas" class="info-box">
                <p>Estatísticas</p>
                <p style="color: #999; font-size: 13px;">Carregue um arquivo para ver os dados</p>
            </div>

            <div>
                <label for="visualizacao">
                    Escolha o tipo de visualização:
                </label>
                <select id="visualizacao">
                    <option>Pontos</option>
                    <option>Símbolos Proporcionais</option>
                    <option>Coroplético</option>
                </select>
            </div>
        </aside>

        <section class="map-container">
            <div id="map"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
